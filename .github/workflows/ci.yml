name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -noEmit

      - name: Build
        env:
          DB_SERVER: localhost
          DB_USER: web
          DB_PASSWORD: dummy
          WEBDB_NAME: WebDB
          USERDB_NAME: UserDB
          GAMEDB_NAME: GameDB
          CLANDB_NAME: ClanDB
          SERVERDB_NAME: ServerDB
          LOGDB_NAME: LogDB
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: dummy-secret
          NODE_ENV: production
        run: npm run build
